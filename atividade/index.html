<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    
    <link rel="stylesheet" href="./style.css">
    <title>Map API</title>
</head>
<body>
    <header id="gradiente">
        <div class="logo">
            <img src="https://images.vexels.com/media/users/3/157933/isolated/preview/e1855ec756f425b054d7c567a57e95b2-dark-earth-icon.png" alt="Earth Icon">
            <h1>LOCAL FINDER</h1>
        </div>
        <button onclick="localizarUsuario()" class="onde-estou">Onde estou?</button>
        <div class="busca">
            <input type="text" id="campo-busca" placeholder="Digite um lugar...">
            <button onclick="buscarLocalizacao()" class="send"><img src="./img/buscar-local.svg" class="send-img"></button>
        </div>
    </header>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="./script.js"></script>
</body>
</html>
