<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maps 2.0 | Visão Inteligente</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="ui-wrapper">
        <div class="search-bar">
            <input type="text" id="input-busca" placeholder="Pesquisar país, estado ou cidade...">
            <button id="btn-busca">🔍</button>
            <div class="divider"></div>
            <button id="btn-gps" title="Minha Localização">🎯</button>
        </div>

        <div class="map-layers">
            <button id="layer-street" class="active">Rua</button>
            <button id="layer-sat">Satélite</button>
        </div>
    </div>

    <div id="map"></div>
    <div id="status-bar">Aguardando pesquisa...</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./script.js"></script>
</body>
</html>
